<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rushd - {% block title %}{% endblock %}</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; color: #222; }
  h1 { font-size: 1.25rem; }
  h2 { font-size: 1rem; margin-top: 1.5rem; }
  .msg { margin: 0.75rem 0; padding: 0.6rem 0.9rem; border-radius: 0.5rem; white-space: pre-wrap; }
  .msg.assistant { background: #f1f1f1; }
  .msg.user { background: #dbeafe; margin-left: 2rem; }
  form.chat-form { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
  form.chat-form textarea { flex: 1; padding: 0.5rem; font: inherit; }
  button { padding: 0.5rem 1rem; font: inherit; cursor: pointer; }
  button:disabled { cursor: wait; opacity: 0.7; }
  .done-form { margin-top: 0.5rem; }
  .rating { display: flex; justify-content: space-between; padding: 0.25rem 0; border-bottom: 1px solid #eee; }
  .error { color: #b00020; }
  .loading-text { color: #666; margin-left: 0.5rem; }
  form.chat-form .loading-text { flex-basis: 100%; margin-left: 0; }
</style>
{% block head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
<script>
  document.querySelectorAll('form').forEach(function (form) {
    var indicator = form.querySelector('.loading-text');
    if (!indicator) return;
    form.addEventListener('submit', function () {
      var btn = form.querySelector('button[type="submit"]');
      if (btn) btn.disabled = true;
      indicator.hidden = false;
    });
  });
</script>
</body>
</html>
